<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Daniel Aderibigbe</title>
    <link href="style.css" rel="stylesheet" />
  </head>

  <body>
    <!-- 🔥 SHOWS VIEW -->
    <div id="shows-view">
      <div class="header">
        <h1>TV Show Episodes</h1>
        <p id="show-count"></p>

        <div class="search-wrapper">
          <select id="show-selector"></select>

          <input id="show-search" placeholder="Search shows..." />
        </div>
      </div>

      <div id="shows-container"></div>
    </div>

    <!-- 📺 EPISODES VIEW -->
    <div id="episodes-view" style="display: none">
      <div class="controls">
        <button id="back-btn">← Back</button>

        <input id="search" placeholder="Search episodes..." />

        <select id="show-select"></select>
      </div>

      <p id="message"></p>
      <p id="count"></p>

      <div id="root"></div>
    </div>

    <footer class="footer">
      <p>
        Data originally sourced from
        <a href="https://www.tvmaze.com" target="_blank"> TVMaze.com </a>
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
